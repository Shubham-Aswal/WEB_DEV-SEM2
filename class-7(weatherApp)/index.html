<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="weather-app">
        <h1 class="app-title">Weather Forecast</h1>
        
        <div class="search-container">
            <form class="search-form">
                <input 
                    type="text" 
                    placeholder="Search city..." 
                    id="intbx"
                    class="search-input"
                    autocomplete="off"
                >
                <button type="button" id="submit" class="search-btn">
                    <span>Search</span>
                </button>
            </form>
        </div>

        <div class="weather-result">
            <div class="weather-card">
                <div class="weather-header">
                    <h2 id="city-name" class="city-name">------</h2>
                    <p id="date" class="date">Loading...</p>
                </div>

                <div class="weather-body">
                    <div class="weather-icon-container">
                        <img src="./icons8-no-data-availible-96.png" alt="Not Found" id="wicon" class="weather-icon">
                    </div>

                    <div class="weather-info">
                        <div class="temperature">
                            <span id="temp" class="temp-value">--</span>
                            <span class="temp-unit">°C</span>
                        </div>
                        <p id="wthr" class="weather-condition">________</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
